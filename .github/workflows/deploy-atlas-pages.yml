name: Deploy Kikuchi Atlas gallery

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub prerelease containing chunks of the verified static gallery ZIP
        required: true
        default: atlas-gallery-web-0.1.0-draft.1
        type: string
      asset_glob:
        description: Glob matching the ordered static-gallery ZIP chunks to deploy
        required: true
        default: kikuchi-atlas-gallery-web-0.1.0-draft.1.zip.part-*
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kikuchi-atlas-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Download curated gallery payload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p payload site
          gh release download "${{ inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${{ inputs.asset_glob }}" \
            --dir payload
          shopt -s nullglob
          chunks=(payload/*.part-*)
          test "${#chunks[@]}" -gt 1
          printf '%s\n' "${chunks[@]}" | LC_ALL=C sort | xargs cat > gallery.zip
          test "$(sha256sum gallery.zip | cut -d ' ' -f1)" = \
            "e34c1b78b8503e72c7dad7d375e02c689bf3dce09c6a4123ddd0ea9441684ba9"
          unzip -q gallery.zip -d site
          test -f site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
