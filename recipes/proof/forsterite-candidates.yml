    euler_bunge_deg: [0.0, 0.0, 0.0]
    bunge_phi1_deg: 0.0
    zone_axis_uvw: [0, 0, 1]
    zone_axis_intent: Center the [001] zone direction on sample ND.
    composition_intent: Establish a restrained shortest c-axis baseline with orthogonal band families.
  - id: fo-001-phi1-035
