schema_version: 1
phase: forsterite (Mg2SiO4)
space_group: Pnma (No. 62, standard setting)
point_group: mmm
lattice_abc_angstrom: [10.207, 5.980, 4.756]
orientation_convention: >-
  active crystal-to-sample Bunge ZXZ Euler angles in degrees; sample axes are
  EDAX-TSL [RD, TD, ND]
equivalence_tolerance_deg: 0.01
generation_rationale: >-
  Center selected axial and mixed low-index forsterite zone directions on
  sample ND, then vary in-plane roll to sample axial, diagonal, asymmetric,
  open, and dense band compositions with one deterministic review order.
exhaustive: false
candidates:
  - id: fo-001-r000
    name: c-axis axial
    euler_bunge_deg: [0.0, 0.0, 0.0]
    zone_axis_hkl: [0, 0, 1]
    zone_axis_intent: Center the [001] zone direction on sample ND.
    composition_intent: Establish a restrained axial baseline with orthogonal band families.
  - id: fo-001-r035
    name: c-axis rolled
    euler_bunge_deg: [35.0, 0.0, 0.0]
    zone_axis_hkl: [0, 0, 1]
    zone_axis_intent: Center the [001] zone direction on sample ND with 35 degree roll.
    composition_intent: Test whether a diagonal axial composition reads more dynamically than the baseline.
  - id: fo-100-r000
    name: a-axis axial
    euler_bunge_deg: [180.0, 90.0, 90.0]
    zone_axis_hkl: [1, 0, 0]
    zone_axis_intent: Center the [100] zone direction on sample ND.
    composition_intent: Expose the contrasting a-axis band hierarchy in a vertically anchored composition.
  - id: fo-100-r040
    name: a-axis rolled
    euler_bunge_deg: [220.0, 90.0, 90.0]
    zone_axis_hkl: [1, 0, 0]
    zone_axis_intent: Center the [100] zone direction on sample ND with 40 degree roll.
    composition_intent: Rotate the a-axis hierarchy into an energetic diagonal arrangement for comparison.
  - id: fo-010-r015
    name: b-axis shallow roll
