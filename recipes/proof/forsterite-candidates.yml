    zone_axis_hkl: [0, 1, 0]
    zone_axis_intent: Center the [010] zone direction on sample ND with 15 degree roll.
    composition_intent: Sample the long-b-axis view while keeping a modest near-axial visual anchor.
  - id: fo-010-r055
