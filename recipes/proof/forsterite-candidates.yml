schema_version: 1
phase: forsterite (Mg2SiO4)
space_group: Pnma (No. 62, standard setting)
point_group: mmm
lattice_abc_angstrom: [10.207, 5.980, 4.756]
orientation_convention: >-
  active crystal-to-sample Bunge ZXZ Euler angles in degrees; sample axes are
  EDAX-TSL [RD, TD, ND]
phi1_semantics: >-
  bunge_phi1_deg is the explicit first Bunge Euler angle; it is a reproducible
  in-plane composition choice, not an absolute roll measured from a zone-axis
  alignment reference
equivalence_tolerance_deg: 0.01
generation_rationale: >-
  Center selected axial and mixed low-index forsterite zone directions on
  sample ND, then choose explicit Bunge phi1 values to sample axial, diagonal,
  asymmetric, open, and dense band compositions in one deterministic review
  order. Phi1 is not treated as an absolute roll from a generated zero frame.
exhaustive: false
