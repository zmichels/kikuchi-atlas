schema_version: 1
name: forsterite-selected-final
intent: Reproduce the selected forsterite geometry with a scientific branch and a separately labeled, clarity-forward gallery branch.
quality_contract:
  final_minimum_long_edge_px: 2048
  final_profile: production-target
  development_profile: selected-proof-geometry
source_contract:
  identifier: COD-9000319
  source_id: source-ca21e09f345e7146
  sha256: 550b8c89c617267d39e7cb6a07fe6f55cd2343453c1c45ec77738bf6fd25d9cd
  phase:
    name: forsterite
    formula: Mg2SiO4
    space_group_number: 62
    space_group_setting: P n m a
energy_kev: 20.0
final_detector:
  shape: [1536, 2048]
  pcx: 0.50
  pcy: 0.72
  pcz: 0.60
  pc_convention: tsl
  sample_tilt_deg: 70.0
  detector_tilt_deg: 0.0
  detector_azimuth_deg: 0.0
  detector_twist_deg: 0.0
  pixel_size_um: 5.859375
  binning: 1
  supersampling: 2
processing:
  pixel_parameter_scaling: linear-from-reference-shape
  reference_native_shape: [180, 240]
  reference_supersampled_shape: [360, 480]
  acquisition:
    name: background_divide
    parameters:
      sigma_px: 18.0
      epsilon: 0.000001
  scientific:
    - name: downsample
      parameters:
        shape: detector_native
    - name: robust_normalize
      parameters:
        low_percentile: 0.0
        high_percentile: 100.0
    - name: local_contrast
      parameters:
        clip_limit: 0.004
        kernel_size: [24, 24]
        input_domain: clip_0_1
    - name: tone_map
      parameters:
        black: 0.0
        white: 1.0
        gamma: 1.0
  gallery:
    - name: downsample
      parameters:
        shape: detector_native
    - name: fine_detail_attenuate
      parameters:
        sigma_px: 0.6
        residual_retention: 0.5
    - name: robust_normalize
      parameters:
        low_percentile: 0.0
        high_percentile: 100.0
    - name: local_contrast
      parameters:
        clip_limit: 0.0045
        kernel_size: [32, 32]
        input_domain: clip_0_1
    - name: unsharp
      parameters:
        radius_px: 1.6
        amount: 0.14
        threshold: 0.035
    - name: tone_map
      parameters:
        black: -0.02
        white: 1.06
        gamma: 1.0
clarity:
  reference_role: descriptive-only-not-calibrated-truth
  line_overlays: false
  suppress_proof_speckle: true
  smooth_band_interiors: true
  coherent_detail: broad-band-thresholded
  node_emphasis: highlight-headroom
