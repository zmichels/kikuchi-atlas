schema_version: 1
title: Kikuchi Atlas curated individual-product registry
claim_boundary: >-
  This is a curated release registry, not a dump of every intermediate local
  file. Each entry names the actual media first, its product families, and
  provenance links. Product family describes presentation; it does not make an
  illustration, mesh, or motion study an EBSD acquisition or indexable
  dictionary pattern.
product_families:
  - id: direct-reflector-template
    label: Direct-reflector hemisphere template
    coverage: core
    description: Crisp, vector-led hemisphere of selected reflector traces and bands.
    claim_boundary: An idealized direct-reflector presentation, not a detector-calibrated Kikuchi pattern.
  - id: orientation-variation
    label: Orientation variation
    coverage: core
    description: A deliberate alternative crystal-to-sample orientation of the same presentation family.
    claim_boundary: A view/orientation study; its composition remains presentation-specific.
  - id: x-axis-motion
    label: X-axis rotation study
    coverage: core
    description: A full rotation about the sample horizontal axis.
    claim_boundary: Motion communicates orientation change and is not a time-resolved EBSD measurement.
  - id: reflector-ridge-globe
    label: Printable reflector-ridge globe
    coverage: core
    description: A spherical STL whose relief follows selected direct-reflector bands.
    claim_boundary: A canonical geometry product, not a printer-qualified or detector-intensity surface.
  - id: intensity-master
    label: Intensity-bearing master study
    coverage: extension
    description: A high-detail simulated intensity-field presentation.
    claim_boundary: The named simulation tier and source govern any scientific claim; it is not an acquired pattern.
  - id: depth-field-motion
    label: Depth-field motion study
    coverage: extension
    description: Additive or near-depth band treatment with staged depth cues.
    claim_boundary: An intentionally idealized visual treatment, not a physical depth reconstruction.
  - id: intensity-relief-globe
    label: Printable intensity-relief globe
    coverage: extension
    description: An STL mapped from a modeled spherical intensity field.
    claim_boundary: Print geometry derived from a stated field model; physical print acceptance remains separate.
products:
